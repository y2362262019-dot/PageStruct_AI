{% if tasks %}
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>任务名称</th>
        <th>类型</th>
        <th>状态</th>
        <th class="number">总数</th>
        <th class="number">完成</th>
        <th class="number">失败</th>
        <th>创建时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for task in tasks %}
      <tr>
        <td class="truncate" title="{{ task.task_name }}">{{ task.task_name }}</td>
        <td>{{ task.task_type }}</td>
        <td><span class="status status-{{ task.status|lower }}">{{ task.status }}</span></td>
        <td class="number">{{ task.total_count }}</td>
        <td class="number">{{ task.completed_count }}</td>
        <td class="number">{{ task.failed_count }}</td>
        <td>{{ task.created_at.strftime("%Y-%m-%d %H:%M:%S") }}</td>
        <td><a class="table-action" href="/tasks/{{ task.id }}">查看</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="empty-state">暂无任务。</div>
{% endif %}
