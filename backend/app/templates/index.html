{% extends "base.html" %}

{% block title %}首页{% endblock %}

{% block content %}
<section class="panel">
  <div class="section-heading">
    <h1>PageStruct AI</h1>
    <p>网页内容标准化解析系统</p>
  </div>

  <div class="grid two-columns">
    <form class="form-card" hx-post="/tasks/single" hx-target="#message" hx-swap="innerHTML">
      <h2>单条 URL 解析</h2>
      <label for="single-url">网页链接</label>
      <input id="single-url" type="url" name="url" placeholder="https://example.com/page.html" required>
      <button type="submit">创建单条解析任务</button>
      <p class="form-note">创建任务后暂不解析网页，解析流程将在后续阶段实现。</p>
    </form>

    <form class="form-card"
          hx-post="/tasks/batch/upload"
          hx-target="#message"
          hx-swap="innerHTML"
          enctype="multipart/form-data">
      <h2>批量文件解析</h2>
      <label for="batch-file">CSV / Excel 文件</label>
      <input id="batch-file" type="file" name="file" accept=".csv,.xlsx" required>
      <label for="url-column">URL 列名</label>
      <input id="url-column" type="text" name="url_column" placeholder="网页链接" required>
      <button type="submit">上传并创建批量任务</button>
      <p class="form-note">创建批量任务后暂不立即解析，批量执行将在后续阶段实现。</p>
    </form>
  </div>

  <div id="message" class="message-region"></div>
</section>
{% endblock %}
